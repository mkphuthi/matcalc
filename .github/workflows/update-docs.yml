# Regenerate API documentation and tutorial markdown on each release and
# deploy directly to GitHub Pages without committing the generated files
# back into the repository.
name: Update Docs

on:
  # Run after the Release workflow finishes. workflow_run executes against the
  # default branch (main), which satisfies the github-pages environment's
  # deployment-branch policy. A release: published trigger would run on the
  # tag ref and be blocked by that policy.
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress runs since we want
# production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.repository == 'materialyzeai/matcalc' &&
      (github.event_name != 'workflow_run' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install matcalc with docs dependencies
        run: |
          uv sync --group dev
          uv pip install -e .

      - name: Generate documentation
        run: uv run invoke make-docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
